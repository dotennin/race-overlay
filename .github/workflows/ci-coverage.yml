name: CI Coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest -q

  coverage:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          uv sync --dev
          uv add --dev pytest-cov
      - name: Run coverage
        run: uv run pytest --cov=src/race_overlay --cov-report=xml --cov-report=term-missing
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Build coverage markdown summary
        id: covsum
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          format: markdown
          output: both

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Export coverage percent
        id: covpercent
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path
          txt = Path('code-coverage-results.md').read_text(encoding='utf-8')
          m = re.search(r"\*\*Summary\*\*\s*\|\s*(\d+(?:\.\d+)?)%", txt)
          if not m:
              m = re.search(r"\b(\d+(?:\.\d+)?)%\b", txt)
          if not m:
              raise SystemExit('Unable to parse coverage percentage from summary markdown')
          pct = float(m.group(1))
          Path('coverage-badge.json').write_text(
              '{"schemaVersion":1,"label":"coverage","message":"%.2f%%","color":"%s"}' % (
                  pct,
                  'brightgreen' if pct >= 90 else 'green' if pct >= 80 else 'yellow' if pct >= 70 else 'orange' if pct >= 60 else 'red'
              ),
              encoding='utf-8'
          )
          print(f"coverage={pct:.2f}")
          PY

      - name: Prepare badge publish directory
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p .coverage-badge-publish
          cp coverage-badge.json .coverage-badge-publish/coverage-badge.json

      - name: Publish badge JSON to docs branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: docs
          publish_dir: .coverage-badge-publish
          destination_dir: badges
          keep_files: true
          force_orphan: false
          enable_jekyll: false
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

