name: CI Coverage

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest -q

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate coverage report
        run: uv run pytest --cov=src/race_overlay --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: ./coverage.xml
          title: Coverage Report

      - name: Generate coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python -m pip install "setuptools<81" coverage-badge
          coverage-badge -o coverage.svg

      - name: Update coverage badge on docs branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p docs-branch
          cd docs-branch
          git init
          git remote add origin "${{ github.server_url }}/${{ github.repository }}.git"
          git fetch origin docs || true
          if git show-ref --verify --quiet refs/remotes/origin/docs; then
            git checkout -b docs refs/remotes/origin/docs
          else
            git checkout --orphan docs
            git rm -rf . || true
          fi
          cp ../coverage.svg coverage.svg
          git add coverage.svg
          if git diff --cached --quiet -- coverage.svg; then
            echo "No coverage badge changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update coverage badge"
          git push origin docs
